name: test

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Unit tests (stdlib only)
        run: python3 tests/test_hook.py
      - name: Installer syntax check
        run: bash -n install.sh
